<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onclick</title>
    <style>
        body{
            background-color: black;
        }
        #circle{
            border: 5px solid white; 
            width: 50px;
            height: 50px;
            border-radius: 100px;
        }
        #circle.toggle{
            background-color: yellow;
            box-shadow: 10px 5px 15px yellow,-10px 5px 15px yellow;
        }
    </style>
</head>
<body id="body">
    <div id="circle"></div>
     <button onclick="circle.classList.toggle('toggle')">click</button>
    <script>
       var circle = document.getElementById("circle");
    </script>
</body>
</html>
