<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color</title>
</head>
<body id="body">
    <input type="color" oninput="change_color()"id="menu">
    <script>
      function change_color () {
        var body = document.getElementById("body");
        var color = document.getElementById("menu").value;
        body.style.backgroundColor=color;
      }
    </script>
</body>
</html>
