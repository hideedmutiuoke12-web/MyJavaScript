<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>after</title>
    <style>
        h1{
            position: relative;
            width: max-content;
        }
        h1::after{
            content: "";
            background-color: red;
            width: 100%;
            height: 5px;
            position: absolute;
            left:0;
            bottom: 0px;
            transition:200ms;
        }
        h1:hover::after{
            width: 0;
        }
        .ff{
            background-color: blue;
            width: max-content;
        }
    </style>
</head>
<body>
    <h1>How are you</h1>
    <div class="ff">
        <p>uuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuu</p>
    </div>
</body>
</html>
