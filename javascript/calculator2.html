<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>caculator</title>
    <style>

    </style>
</head>
<body>
    <input type="number" id="menu">
   <Div>
    <button id="btn">1</button>
    <button>2</button>
    <button>3</button>
    <button>4</button>
    <button>5</button>
   </Div> 
   <script>
    let btn = document.getElementById("btn");
    let menu = Number(document.getElementById("menu").value).innerHTML
    btn.addEventListener("click",function(){
        btn.textContent=1;
        btn=menu;
    })
   </script>
</body>
</html>
