<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
        }
     #circle{
        width:50px;
        height: 50px;
        border-radius: 100px;
        border: 5px solid white;
     }
    </style>
</head>
<body>
    <div id="circle"></div>
    <button onclick="btn()">click</button>
    <script>
        let circle = document.getElementById("circle").innerHTML;
        function btn(){
            switch(true){
                case (circle.style.backgroundColor=="black"):
                    circle.style.backgroundColor=="yellow";
                    break;
                case (circle.style.backgroundColor=="yellow"):
                    circle.style.backgroundColor=="black";
                    break;

            }
        }
        btn();
    </script>
</body>
</html>
